<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mini PWA">
    <title>Mini PWA</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <p class="eyebrow">PWA demo</p>
        <h1 id="app-title">Mini PWA</h1>
        <p class="intro">A tiny installable app hosted on GitHub Pages. It works offline and keeps your note on this device.</p>
      </section>

      <section class="panel" aria-labelledby="counter-title">
        <div>
          <p class="label" id="counter-title">Counter</p>
          <p class="counter-value" id="counterValue">0</p>
        </div>
        <button class="primary-button" type="button" id="counterButton">+1</button>
      </section>

      <section class="panel note-panel" aria-labelledby="note-title">
        <label class="label" id="note-title" for="noteInput">Note</label>
        <textarea id="noteInput" rows="4" placeholder="Type something you want to save"></textarea>
        <div class="note-actions">
          <button class="secondary-button" type="button" id="saveNoteButton">Save note</button>
          <button class="text-button" type="button" id="clearNoteButton">Clear</button>
        </div>
        <div class="saved-note" aria-live="polite">
          <p class="label">Saved note</p>
          <p id="savedNoteText" class="saved-note-text">Nothing saved yet.</p>
          <p id="savedNoteMeta" class="hint">Save a note to see it here.</p>
        </div>
      </section>

      <footer class="status-bar">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">Ready</span>
      </footer>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
